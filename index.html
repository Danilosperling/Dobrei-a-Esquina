<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#120b08" />
  <title>Dobrei a Esquina | D. Marques</title>

  <style>
    :root {
      --bg: #120b08;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, .42);
      --glass: rgba(18, 11, 8, .48);
      --stroke: rgba(255, 255, 255, .34);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      overflow-x: hidden;
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: max(10px, env(safe-area-inset-top)) 15px max(20px, env(safe-area-inset-bottom));
    }

    .background {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(10, 5, 4, .38), rgba(10, 5, 4, .64)), url("./Dobrei%20a%20Esquina%20Capa.png");
      background-size: cover;
      background-position: center;
      filter: blur(25px) brightness(.6);
      transform: scale(1.1);
      z-index: 0;
    }

    .player {
      width: min(100%, 430px);
      min-height: min(780px, calc(100svh - 30px));
      position: relative;
      z-index: 1;
      border: 1px solid var(--stroke);
      border-radius: 32px;
      background: linear-gradient(145deg, rgba(255,255,255,.10), rgba(255,255,255,.025)), var(--glass);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      padding: 25px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    .cover-wrap {
      width: min(75%, 260px);
      aspect-ratio: 1;
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(0,0,0,.5);
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .cover { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; }

    .meta { text-align: center; margin-bottom: 10px; }
    .title { font-size: 1.1rem; font-weight: 800; }
    .artist { color: var(--muted); font-size: .85rem; margin-top: 4px; }

    .lyrics-viewport {
      width: 100%;
      height: 180px;
      position: relative;
      overflow: hidden;
      mask-image: linear-gradient(transparent, black 20%, black 80%, transparent);
      -webkit-mask-image: linear-gradient(transparent, black 20%, black 80%, transparent);
      margin-bottom: 15px;
      flex-grow: 1;
    }

    .lyrics-list {
      width: 100%;
      transition: transform 700ms cubic-bezier(0.22, 1, 0.36, 1);
      will-change: transform;
    }

    .line {
      min-height: 45px; /* Altura mínima */
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 5px 15px;
      font-size: 0.95rem; /* Ajustado para não cortar */
      line-height: 1.3;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.15);
      filter: blur(2px);
      transform: scale(0.9);
      transition: all 500ms ease;
      white-space: normal; /* PERMITE QUEBRA DE LINHA */
      word-wrap: break-word;
    }

    .line.active {
      color: #ffffff !important;
      filter: blur(0) !important;
      transform: scale(1.08); /* Escala levemente menor para caber texto longo */
      opacity: 1;
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
    }

    .progress-wrap { width: 100%; margin-bottom: 20px; }
    .time-row { display: flex; justify-content: space-between; font-size: .7rem; color: var(--muted); margin-bottom: 8px; }
    
    input[type="range"] {
      width: 100%;
      height: 5px;
      appearance: none;
      -webkit-appearance: none;
      background: rgba(255,255,255,0.2);
      border-radius: 5px;
      outline: none;
    }

    .controls { width: 100%; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; }
    
    .volume-box { display: flex; align-items: center; gap: 5px; justify-self: start; }
    .volume-box input { width: 60px; }

    .icon-btn { background: transparent; border: none; color: white; cursor: pointer; padding: 5px; display: grid; place-items: center; }

    .play-button { 
      width: 65px; height: 65px; border-radius: 50%; border: 2px solid #fff; 
      background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; display: grid; place-items: center;
    }

    .share-btn { justify-self: end; }

    .tap-layer {
      position: fixed; inset: 0; z-index: 99; background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
    }
    .tap-layer.hidden { display: none; }
    .start-btn { padding: 16px 32px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; font-weight: bold; cursor: pointer; }

    .hint { margin-top: 15px; font-size: 0.7rem; color: var(--muted); text-align: center; }
  </style>
</head>
<body>

  <div class="background"></div>

  <div class="tap-layer" id="tapLayer">
    <button class="start-btn" id="startBtn">TOCAR MÚSICA</button>
  </div>

  <main class="player">
    <div class="cover-wrap">
      <img src="./Dobrei%20a%20Esquina%20Capa.png" class="cover" alt="Capa">
    </div>

    <div class="meta">
      <div class="title">Dobrei a Esquina</div>
      <div class="artist">D. Marques</div>
    </div>

    <div class="lyrics-viewport">
      <div class="lyrics-list" id="lyricsList"></div>
    </div>

    <div class="progress-wrap">
      <div class="time-row">
        <span id="curTime">0:00</span>
        <span id="durTime">0:00</span>
      </div>
      <input type="range" id="progress" value="0">
    </div>

    <div class="controls">
      <div class="volume-box">
        <button class="icon-btn" id="muteBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5 6 9H3v6h3l5 4V5Z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg>
        </button>
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8">
      </div>

      <button class="play-button" id="playBtn">
        <svg id="playIcon" width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>

      <button class="icon-btn share-btn" id="shareBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      </button>
    </div>
    
    <div class="hint" id="hint">letra sincronizada</div>
  </main>

  <audio id="audio" src="Dobrei%20a%20Esquina.mp3" preload="auto"></audio>

  <script>
    const audio = document.getElementById('audio');
    const lyricsList = document.getElementById('lyricsList');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const progress = document.getElementById('progress');
    const volume = document.getElementById('volume');
    const muteBtn = document.getElementById('muteBtn');
    const shareBtn = document.getElementById('shareBtn');
    const tapLayer = document.getElementById('tapLayer');
    const startBtn = document.getElementById('startBtn');
    const hint = document.getElementById('hint');

    const lyrics = [
      { time: 0, text: "" },
      { time: 12, text: "Saí de casa sem querer sair" },
      { time: 18, text: "Fui mais pra esquecer do que pra me divertir" },
      { time: 26, text: "Tava cansado, sem acreditar" },
      { time: 30, text: "Que ainda existia alguém pra me encontrar" },
      { time: 33, text: "Depois de umas doses, sem direção" },
      { time: 36, text: "Deixei a vida ir, sem ter noção" },
      { time: 39, text: "Dobrei a esquina que eu sempre evitei" },
      { time: 43, text: "E foi ali que o meu rumo mudei" },
      { time: 46, text: "Você tava ali, eu nem preparado" },
      { time: 48, text: "Mas bastou um segundo pra mudar meu passado" },
      { time: 51, text: "Eu nem te vi, mas você me enxergou" },
      { time: 55, text: "E o destino ali já me encontrou" },
      { time: 58, text: "Mais tarde a mensagem veio chamar" },
      { time: 61, text: "E em poucas palavras me fez te enxergar" },
      { time: 65, text: "Depois a gente resolveu se encontrar" },
      { time: 68, text: "Bastou um olhar pra eu me entregar" }
    ];

    lyrics.forEach((item) => {
      const div = document.createElement('div');
      div.className = 'line';
      div.textContent = item.text;
      lyricsList.appendChild(div);
    });

    const lines = document.querySelectorAll('.line');

    function sync() {
      const now = audio.currentTime;
      const pct = (now / audio.duration) * 100;
      progress.value = pct || 0;
      document.getElementById('curTime').textContent = formatTime(now);
      document.getElementById('durTime').textContent = formatTime(audio.duration);

      let activeIdx = 0;
      for (let i = 0; i < lyrics.length; i++) {
        if (now >= lyrics[i].time) activeIdx = i;
      }

      lines.forEach((line, i) => {
        line.classList.toggle('active', i === activeIdx);
      });

      // Cálculo dinâmico do offset para centralizar
      const activeLine = lines[activeIdx];
      if (activeLine) {
        const viewportHeight = document.querySelector('.lyrics-viewport').offsetHeight;
        const lineOffsetTop = activeLine.offsetTop;
        const lineHeight = activeLine.offsetHeight;
        const scrollAmount = lineOffsetTop - (viewportHeight / 2) + (lineHeight / 2);
        lyricsList.style.transform = `translateY(${-scrollAmount}px)`;
      }
    }

    function formatTime(s) {
      if(isNaN(s)) return "0:00";
      const min = Math.floor(s / 60);
      const sec = Math.floor(s % 60).toString().padStart(2, '0');
      return `${min}:${sec}`;
    }

    function togglePlay() {
      if (audio.paused) {
        audio.play();
        playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      } else {
        audio.pause();
        playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
      }
    }

    startBtn.addEventListener('click', () => {
      tapLayer.classList.add('hidden');
      togglePlay();
    });

    playBtn.addEventListener('click', togglePlay);
    audio.addEventListener('timeupdate', sync);
    
    progress.addEventListener('input', () => {
      audio.currentTime = (progress.value / 100) * audio.duration;
    });

    volume.addEventListener('input', () => { audio.volume = volume.value; });

    muteBtn.addEventListener('click', () => {
      audio.muted = !audio.muted;
      muteBtn.style.opacity = audio.muted ? "0.5" : "1";
    });

    shareBtn.addEventListener('click', async () => {
      const data = { title: 'Dobrei a Esquina', url: window.location.href };
      if (navigator.share) {
        try { await navigator.share(data); } catch (e) {}
      } else {
        navigator.clipboard.writeText(window.location.href);
        hint.textContent = "Link copiado!";
        setTimeout(() => hint.textContent = "letra sincronizada", 2000);
      }
    });

  </script>
</body>
</html>
