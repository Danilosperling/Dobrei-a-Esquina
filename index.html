<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#120b08" />
  <title>Dobrei a Esquina | D. Marques</title>

  <style>
    :root {
      --bg: #120b08;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, .42);
      --soft: rgba(255, 255, 255, .16);
      --glass: rgba(18, 11, 8, .48);
      --stroke: rgba(255, 255, 255, .34);
      --accent: #d39a5f;
      --accent-2: #f4d0a4;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      overflow-x: hidden;
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: max(18px, env(safe-area-inset-top)) 18px max(28px, env(safe-area-inset-bottom));
      position: relative;
    }

    .background {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(10, 5, 4, .38), rgba(10, 5, 4, .64)), url("./Dobrei%20a%20Esquina%20Capa.png");
      background-size: cover;
      background-position: center;
      filter: blur(25px) brightness(.6);
      transform: scale(1.1);
      z-index: 0;
    }

    .player {
      width: min(100%, 430px);
      min-height: min(780px, calc(100svh - 38px));
      position: relative;
      z-index: 1;
      border: 1px solid var(--stroke);
      border-radius: 32px;
      background: linear-gradient(145deg, rgba(255,255,255,.10), rgba(255,255,255,.025)), var(--glass);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      padding: 28px 22px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    .cover-wrap {
      width: min(70%, 260px);
      aspect-ratio: 1;
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(0,0,0,.5);
      margin-bottom: 20px;
    }

    .cover { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; }

    .meta { text-align: center; margin-bottom: 20px; }
    .title { font-size: 1.1rem; font-weight: 800; }
    .artist { color: var(--muted); font-size: .85rem; margin-top: 4px; }

    /* --- ÁREA DA LETRA --- */
    .lyrics-viewport {
      width: 100%;
      height: 160px;
      position: relative;
      overflow: hidden;
      mask-image: linear-gradient(transparent, black 25%, black 75%, transparent);
      -webkit-mask-image: linear-gradient(transparent, black 25%, black 75%, transparent);
      margin-bottom: 20px;
    }

    .lyrics-list {
      width: 100%;
      transition: transform 700ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .line {
      height: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 10px;
      font-size: 1rem;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.15); /* Bem apagada quando inativa */
      filter: blur(2px);
      transform: scale(0.9);
      transition: all 500ms ease;
    }

    .line.active {
      color: #ffffff !important; /* Branco Puro */
      filter: blur(0) !important; /* Nitidez Total */
      transform: scale(1.15); /* Destaque de tamanho */
      opacity: 1;
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
    }

    /* --- CONTROLES --- */
    .progress-wrap { width: 100%; margin-bottom: 20px; }
    .time-row { display: flex; justify-content: space-between; font-size: .7rem; color: var(--muted); margin-bottom: 8px; }
    
    input[type="range"] {
      width: 100%;
      height: 5px;
      appearance: none;
      background: rgba(255,255,255,0.2);
      border-radius: 5px;
      outline: none;
    }

    .controls { width: 100%; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; }
    .play-button { 
      width: 65px; height: 65px; border-radius: 50%; border: 2px solid #fff; 
      background: transparent; color: #fff; cursor: pointer; display: grid; place-items: center;
    }

    .tap-layer {
      position: fixed; inset: 0; z-index: 99; background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px);
    }
    .tap-layer.hidden { display: none; }
    .start-btn { padding: 15px 30px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; }

  </style>
</head>
<body>

  <div class="background"></div>

  <div class="tap-layer" id="tapLayer">
    <button class="start-btn" id="startBtn">CLIQUE PARA OUVIR</button>
  </div>

  <main class="player">
    <div class="cover-wrap">
      <img src="./Dobrei%20a%20Esquina%20Capa.png" class="cover" alt="Capa">
    </div>

    <div class="meta">
      <div class="title">Dobrei a Esquina</div>
      <div class="artist">D. Marques</div>
    </div>

    <div class="lyrics-viewport">
      <div class="lyrics-list" id="lyricsList"></div>
    </div>

    <div class="progress-wrap">
      <div class="time-row">
        <span id="curTime">0:00</span>
        <span id="durTime">0:00</span>
      </div>
      <input type="range" id="progress" value="0">
    </div>

    <div class="controls">
      <div></div>
      <button class="play-button" id="playBtn">
        <svg id="playIcon" width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <div></div>
    </div>
  </main>

  <audio id="audio" src="Dobrei%20a%20Esquina.mp3" preload="auto"></audio>

  <script>
    const audio = document.getElementById('audio');
    const lyricsList = document.getElementById('lyricsList');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const progress = document.getElementById('progress');
    const tapLayer = document.getElementById('tapLayer');
    const startBtn = document.getElementById('startBtn');

    // LETRA COM TEMPOS CORRIGIDOS (Inicia aos 12s)
    const lyrics = [
      { time: 0, text: "" },
      { time: 12, text: "Saí de casa sem querer sair" },
      { time: 17, text: "Fui mais pra esquecer do que pra me divertir" },
      { time: 22, text: "Tava cansado, sem acreditar" },
      { time: 27, text: "Que ainda existia alguém pra me encontrar" },
      { time: 33, text: "Depois de umas doses, sem direção" },
      { time: 38, text: "Deixei a vida ir, sem ter noção" },
      { time: 43, text: "Dobrei a esquina que eu sempre evitei" },
      { time: 49, text: "E foi ali que o meu rumo mudei" },
      { time: 55, text: "Você tava ali, eu nem preparado" },
      { time: 60, text: "Mas bastou um segundo pra mudar meu passado" },
      { time: 66, text: "Eu nem te vi, mas você me enxergou" },
      { time: 71, text: "E o destino ali já me encontrou" }
    ];

    // Gerar elementos da letra
    lyrics.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'line';
      div.textContent = item.text;
      lyricsList.appendChild(div);
    });

    const lines = document.querySelectorAll('.line');

    function sync() {
      const now = audio.currentTime;
      
      // Sincronizar Progresso
      const pct = (now / audio.duration) * 100;
      progress.value = pct || 0;
      document.getElementById('curTime').textContent = formatTime(now);
      document.getElementById('durTime').textContent = formatTime(audio.duration);

      // Sincronizar Letra
      let activeIdx = 0;
      for (let i = 0; i < lyrics.length; i++) {
        if (now >= lyrics[i].time) {
          activeIdx = i;
        }
      }

      lines.forEach((line, i) => {
        line.classList.toggle('active', i === activeIdx);
      });

      const offset = 80 - (activeIdx * 45); // Centraliza a linha ativa
      lyricsList.style.transform = `translateY(${offset}px)`;
    }

    function formatTime(s) {
      const min = Math.floor(s / 60);
      const sec = Math.floor(s % 60).toString().padStart(2, '0');
      return `${min}:${sec}`;
    }

    function togglePlay() {
      if (audio.paused) {
        audio.play();
        playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      } else {
        audio.pause();
        playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
      }
    }

    startBtn.addEventListener('click', () => {
      tapLayer.classList.add('hidden');
      togglePlay();
    });

    playBtn.addEventListener('click', togglePlay);
    audio.addEventListener('timeupdate', sync);
    
    progress.addEventListener('input', () => {
      audio.currentTime = (progress.value / 100) * audio.duration;
    });

  </script>
</body>
</html>
