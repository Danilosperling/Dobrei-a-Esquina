<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#120b08" />
  <title>Dobrei a Esquina | D. Marques</title>

  <style>
    :root {
      --bg: #120b08;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, .42);
      --soft: rgba(255, 255, 255, .16);
      --glass: rgba(18, 11, 8, .48);
      --stroke: rgba(255, 255, 255, .34);
      --accent: #d39a5f;
      --accent-2: #f4d0a4;
      --danger: #ffdfb4;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      overflow-x: hidden;
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: max(18px, env(safe-area-inset-top)) 18px max(28px, env(safe-area-inset-bottom));
      position: relative;
    }

    .background {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(10, 5, 4, .38), rgba(10, 5, 4, .64)),
        url("./Dobrei%20a%20Esquina%20Capa.png");
      background-size: cover;
      background-position: center;
      filter: blur(22px) saturate(1.12) brightness(.72);
      transform: scale(1.12);
      z-index: 0;
    }

    .background::before,
    .background::after {
      content: "";
      position: absolute;
      width: 60vw;
      height: 60vw;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(211,154,95,.42), transparent 64%);
      animation: floatGlow 9s ease-in-out infinite alternate;
      mix-blend-mode: screen;
    }

    .background::before {
      top: 8%;
      right: -18%;
    }

    .background::after {
      bottom: 4%;
      left: -20%;
      animation-delay: -4s;
      background: radial-gradient(circle, rgba(244,208,164,.26), transparent 66%);
    }

    @keyframes floatGlow {
      from { transform: translate3d(-12px, 20px, 0) scale(.95); opacity: .45; }
      to { transform: translate3d(18px, -18px, 0) scale(1.08); opacity: .82; }
    }

    .player {
      width: min(100%, 430px);
      min-height: min(780px, calc(100svh - 38px));
      position: relative;
      z-index: 1;
      border: 1px solid var(--stroke);
      border-radius: 32px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.10), rgba(255,255,255,.025)),
        var(--glass);
      backdrop-filter: blur(22px) saturate(1.15);
      -webkit-backdrop-filter: blur(22px) saturate(1.15);
      box-shadow: 0 30px 80px rgba(0,0,0,.42);
      padding: 28px 22px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    .player::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(120deg, transparent 12%, rgba(255,255,255,.22), transparent 44%);
      opacity: .34;
      pointer-events: none;
      animation: glassSweep 7s ease-in-out infinite;
    }

    @keyframes glassSweep {
      0%, 100% { transform: translateX(-55%); }
      50% { transform: translateX(55%); }
    }

    .cover-wrap {
      margin-top: 8px;
      width: min(74%, 270px);
      aspect-ratio: 1;
      border-radius: 13px;
      position: relative;
      box-shadow: 0 24px 48px rgba(0,0,0,.42);
      animation: coverPulse 5s ease-in-out infinite;
      flex: 0 0 auto;
    }

    @keyframes coverPulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(211,154,95,0)); }
      50% { transform: scale(1.018); filter: drop-shadow(0 0 22px rgba(211,154,95,.34)); }
    }

    .cover-wrap.start-pulse {
      animation: startPulse 900ms cubic-bezier(.2, 1, .22, 1), coverPulse 5s ease-in-out infinite 900ms;
    }

    @keyframes startPulse {
      0% { transform: scale(.96); filter: drop-shadow(0 0 0 rgba(244,208,164,0)); }
      45% { transform: scale(1.08); filter: drop-shadow(0 0 38px rgba(244,208,164,.78)); }
      100% { transform: scale(1); filter: drop-shadow(0 0 18px rgba(211,154,95,.28)); }
    }

    .cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: inherit;
    }

    .meta {
      text-align: center;
      margin-top: 18px;
      line-height: 1.35;
    }

    .title {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -.03em;
    }

    .artist {
      margin-top: 4px;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 700;
    }

    .lyrics-viewport {
      width: 100%;
      height: 142px;
      margin: 28px 0 18px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1 1 auto;
      min-height: 132px;
      max-height: 190px;
      mask-image: linear-gradient(transparent 0%, black 28%, black 72%, transparent 100%);
      -webkit-mask-image: linear-gradient(transparent 0%, black 28%, black 72%, transparent 100%);
    }

    .lyrics-list {
      width: 100%;
      transform: translateY(0);
      transition: transform 900ms cubic-bezier(.22, 1, .36, 1);
      will-change: transform;
    }

    .line {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 8px;
      font-size: clamp(.82rem, 3.6vw, 1rem);
      line-height: 1.18;
      font-weight: 800;
      /* Deixamos as linhas inativas mais apagadas para destacar a principal */
      color: rgba(255, 255, 255, 0.2); 
      filter: blur(1px);
      transform: scale(0.92);
      transition: all 600ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .line.active {
      color: #ffffff !important; /* Branco puro */
      opacity: 1;
      filter: blur(0);
      transform: scale(1.15); /* Um pouco maior que o anterior */
      /* Brilho mais intenso para destacar no fundo escuro */
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.6), 0 0 30px rgba(211, 154, 95, 0.3);
    }

    .line.near {
      color: rgba(255, 255, 255, 0.5);
      filter: blur(0.5px);
      transform: scale(1);
    }

    .progress-wrap {
      width: 100%;
      margin: 2px 0 18px;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      color: rgba(255,255,255,.48);
      font-size: .68rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    input[type="range"] {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      height: 5px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent-2) var(--progress, 0%), rgba(255,255,255,.86) var(--progress, 0%));
      outline: none;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(244,208,164,.18);
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 18px rgba(244,208,164,.55);
    }

    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border: 0;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 18px rgba(244,208,164,.55);
    }

    .controls {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 18px;
      margin-top: 2px;
    }

    .volume-box {
      display: flex;
      align-items: center;
      gap: 9px;
      justify-self: start;
      min-width: 0;
    }

    .volume-box input {
      width: 74px;
      opacity: .9;
    }

    .icon-button {
      border: 0;
      background: transparent;
      color: white;
      padding: 8px;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform .2s ease, opacity .2s ease;
    }

    .icon-button:active {
      transform: scale(.94);
    }

    .play-button {
      width: 66px;
      height: 66px;
      border: 2px solid rgba(255,255,255,.86);
      border-radius: 50%;
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .share-button {
      justify-self: end;
    }

    .hint {
      margin-top: 18px;
      min-height: 18px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: .74rem;
      color: rgba(255,255,255,.46);
      text-align: center;
    }

    .tap-layer {
      position: fixed;
      inset: 0;
      z-index: 9;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(10,5,4,.58);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      text-align: center;
    }

    .tap-layer.show {
      display: grid;
    }

    .tap-card {
      width: min(100%, 360px);
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 26px;
      background: rgba(18,11,8,.54);
      padding: 26px 22px;
      box-shadow: 0 25px 70px rgba(0,0,0,.45);
    }

    .tap-card h1 {
      margin: 0 0 10px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 1.18rem;
    }

    .tap-card p {
      margin: 0 0 18px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: rgba(255,255,255,.68);
      line-height: 1.45;
      font-size: .9rem;
    }

    .start-button {
      width: 100%;
      border: 1px solid rgba(255,255,255,.38);
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      color: white;
      font-weight: 800;
      padding: 14px 18px;
      cursor: pointer;
    }

    @media (max-height: 720px) {
      body { padding-top: 12px; padding-bottom: 14px; }
      .player { min-height: calc(100svh - 28px); padding: 18px 18px 22px; border-radius: 28px; }
      .cover-wrap { width: min(54%, 210px); margin-top: 2px; }
      .meta { margin-top: 12px; }
      .lyrics-viewport { margin-top: 16px; height: 118px; min-height: 110px; }
      .line { height: 36px; }
      .play-button { width: 58px; height: 58px; }
      .hint { margin-top: 10px; }
    }
  </style>
</head>
<body>
  <div class="background" aria-hidden="true"></div>

  <main class="player">
    <section class="cover-wrap" aria-label="Capa do álbum">
      <img class="cover" src="./Dobrei%20a%20Esquina%20Capa.png" alt="Capa da música Dobrei a Esquina">
    </section>

    <section class="meta">
      <div class="title">Dobrei a Esquina</div>
      <div class="artist">D. Marques</div>
    </section>

    <section class="lyrics-viewport" aria-label="Letra sincronizada">
      <div class="lyrics-list" id="lyricsList"></div>
    </section>

    <section class="progress-wrap">
      <div class="time-row">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
      </div>
      <input id="progress" type="range" min="0" max="100" value="0" aria-label="Progresso da música" />
    </section>

    <section class="controls">
      <div class="volume-box">
        <button class="icon-button" id="muteBtn" aria-label="Ativar ou desativar som">
          <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 5 6 9H3v6h3l5 4V5Z" />
            <path d="M15.5 8.5a5 5 0 0 1 0 7" />
            <path d="M18.5 5.5a9 9 0 0 1 0 13" />
          </svg>
        </button>
        <input id="volume" type="range" min="0" max="1" value="0.85" step="0.01" aria-label="Volume" />
      </div>

      <button class="icon-button play-button" id="playBtn" aria-label="Reproduzir ou pausar">
        <svg id="playIcon" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 5v14l11-7-11-7Z" />
        </svg>
      </button>

      <button class="icon-button share-button" id="shareBtn" aria-label="Compartilhar">
        <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7" />
          <path d="M16 6 12 2 8 6" />
          <path d="M12 2v14" />
        </svg>
      </button>
    </section>

    <div class="hint" id="hint">letra</div>
  </main>

  <section class="tap-layer" id="tapLayer">
    <div class="tap-card">
      <h1>Dobrei a Esquina</h1>
      <p>Alguns navegadores bloqueiam o autoplay com som. Toque uma vez para iniciar a música.</p>
      <button class="start-button" id="startBtn">Tocar música</button>
    </div>
  </section>

  <audio id="audio" src="Dobrei%20a%20Esquina.mp3" preload="auto" playsinline></audio>

  <script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const shareBtn = document.getElementById('shareBtn');
    const progress = document.getElementById('progress');
    const volume = document.getElementById('volume');
    const muteBtn = document.getElementById('muteBtn');
    const lyricsList = document.getElementById('lyricsList');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');
    const tapLayer = document.getElementById('tapLayer');
    const startBtn = document.getElementById('startBtn');
    const hint = document.getElementById('hint');
    const coverWrap = document.querySelector('.cover-wrap');

    audio.volume = Number(volume.value);

    const lyrics = [
      { time: 0, text: 'Dobrei a Esquina' },
      { time: 12, text: 'Saí de casa sem querer sair' },
      { time: 13, text: 'Fui mais pra esquecer do que pra me divertir' },
      { time: 18, text: 'Tava cansado, sem acreditar' },
      { time: 23, text: 'Que ainda existia alguém pra me encontrar' },
      { time: 29, text: 'Depois de umas doses, sem direção' },
      { time: 34, text: 'Deixei a vida ir, sem ter noção' },
      { time: 39, text: 'Dobrei a esquina que eu sempre evitei' },
      { time: 45, text: 'E foi ali que o meu rumo mudei' },
      { time: 51, text: 'Você tava ali, eu nem preparado' },
      { time: 56, text: 'Mas bastou um segundo pra mudar meu passado' },
      { time: 62, text: 'Eu nem te vi, mas você me enxergou' },
      { time: 67, text: 'E o destino ali já me encontrou' },
      { time: 73, text: 'Mais tarde a mensagem veio chamar' },
      { time: 78, text: 'E em poucas palavras me fez te enxergar' },
      { time: 84, text: 'Depois a gente resolveu se encontrar' },
      { time: 89, text: 'Bastou um olhar pra eu me entregar' },
      { time: 95, text: 'O teu sorriso, esse teu jeito' },
      { time: 100, text: 'Melhor que na foto, ficou tudo perfeito' },
      { time: 106, text: 'E ali eu entendi sem precisar falar' },
      { time: 111, text: 'Que o meu coração voltou a acreditar' },
      { time: 117, text: 'Fomos nos vendo e nos conhecendo' },
      { time: 122, text: 'Tanta conversa, o amor acontecendo' },
      { time: 127, text: 'O tempo voando, a gente se achando' },
      { time: 132, text: 'E quando eu vi, já tava te amando' },
      { time: 138, text: 'E tudo ficou leve do teu lado' },
      { time: 143, text: 'O simples virou algo inesperado' },
      { time: 149, text: 'Cada momento é um presente pra mim' },
      { time: 154, text: 'Histórias que eu sei que não vão ter um fim' },
      { time: 160, text: 'Tem algo que você não percebeu' },
      { time: 165, text: 'Mas quando eu te olho, agradeço a Deus' },
      { time: 171, text: 'Por ter colocado você no meu caminho' },
      { time: 176, text: 'E ter feito eu acreditar de novo em carinho' },
      { time: 183, text: 'Se naquela noite eu não tivesse saído' },
      { time: 188, text: 'Talvez meu mundo ainda fosse perdido' },
      { time: 193, text: 'Mas foi na curva que eu mais evitei' },
      { time: 198, text: 'Que a vida me deu tudo que eu sonhei' },
      { time: 205, text: 'Fomos nos vendo e nos conhecendo' },
      { time: 210, text: 'Tanta conversa, o amor acontecendo' },
      { time: 215, text: 'O tempo voando, a gente se achando' },
      { time: 220, text: 'E quando eu vi, já tava te amando' },
      { time: 226, text: 'E tudo ficou leve do teu lado' },
      { time: 231, text: 'O simples virou algo inesperado' },
      { time: 237, text: 'Cada momento é um presente pra mim' },
      { time: 242, text: 'Histórias que eu sei que não vão ter um fim' },
      { time: 249, text: 'Tem algo que você não percebeu' },
      { time: 255, text: 'Mas quando eu te olho, agradeço a Deus' }
    ];

    lyrics.forEach((item, index) => {
      const line = document.createElement('div');
      line.className = 'line';
      line.textContent = item.text;
      line.dataset.index = index;
      lyricsList.appendChild(line);
    });

    const lines = [...document.querySelectorAll('.line')];
    let activeIndex = 0;

    function formatTime(seconds) {
      if (!Number.isFinite(seconds)) return '0:00';
      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60).toString().padStart(2, '0');
      return `${min}:${sec}`;
    }

    function updatePlayIcon() {
      playIcon.innerHTML = audio.paused
        ? '<path d="M8 5v14l11-7-11-7Z" />'
        : '<path d="M8 5v14" /><path d="M16 5v14" />';
    }

    function setActiveLine(index) {
      if (index === activeIndex && lines[index]?.classList.contains('active')) return;
      activeIndex = index;

      lines.forEach((line, i) => {
        line.classList.toggle('active', i === index);
        line.classList.toggle('near', Math.abs(i - index) === 1);
      });

      const lineHeight = lines[0]?.offsetHeight || 42;
      const viewport = document.querySelector('.lyrics-viewport');
      const offset = (viewport.offsetHeight / 2) - (lineHeight / 2) - (index * lineHeight);
      lyricsList.style.transform = `translateY(${offset}px)`;
    }

    function syncLyrics() {
      const current = audio.currentTime;
      let index = lyrics.findIndex((line, i) => current >= line.time && (!lyrics[i + 1] || current < lyrics[i + 1].time));
      if (index < 0) index = 0;
      setActiveLine(index);
    }

    function updateProgress() {
      const percent = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
      progress.value = percent;
      progress.style.setProperty('--progress', `${percent}%`);
      currentTimeEl.textContent = formatTime(audio.currentTime);
      durationEl.textContent = formatTime(audio.duration);
      syncLyrics();
    }

    async function playAudio() {
      try {
        await audio.play();
        tapLayer.classList.remove('show');
        hint.textContent = 'letra';
      } catch (error) {
        tapLayer.classList.add('show');
      }
      updatePlayIcon();
    }

    playBtn.addEventListener('click', async () => {
      if (audio.paused) {
        await playAudio();
      } else {
        audio.pause();
      }
      updatePlayIcon();
    });

    startBtn.addEventListener('click', playAudio);

    progress.addEventListener('input', () => {
      if (!audio.duration) return;
      audio.currentTime = (Number(progress.value) / 100) * audio.duration;
      updateProgress();
    });

    volume.addEventListener('input', () => {
      audio.volume = Number(volume.value);
      audio.muted = audio.volume === 0;
    });

    muteBtn.addEventListener('click', () => {
      audio.muted = !audio.muted;
      if (!audio.muted && audio.volume === 0) {
        audio.volume = .65;
        volume.value = .65;
      }
    });

    shareBtn.addEventListener('click', async () => {
      const shareData = {
        title: 'Dobrei a Esquina | D. Marques',
        text: 'Ouça Dobrei a Esquina, uma música feita com carinho.',
        url: window.location.href
      };

      if (navigator.share) {
        try {
          await navigator.share(shareData);
        } catch (error) {}
      } else {
        await navigator.clipboard.writeText(window.location.href);
        hint.textContent = 'link copiado';
        setTimeout(() => hint.textContent = 'letra', 1800);
      }
    });

    audio.addEventListener('loadedmetadata', updateProgress);
    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('play', updatePlayIcon);
    audio.addEventListener('pause', updatePlayIcon);
    audio.addEventListener('ended', () => {
      updatePlayIcon();
      setActiveLine(0);
    });

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) updateProgress();
    });

    let hasInteracted = false;
    document.body.addEventListener('click', async (e) => {
      const isControl = e.target.closest('#playBtn, #shareBtn, #muteBtn, #volume, #progress');
      if (isControl) return;

      if (!hasInteracted && audio.paused) {
        hasInteracted = true;
        coverWrap.classList.add('start-pulse');
        setTimeout(() => coverWrap.classList.remove('start-pulse'), 1200);
        await playAudio();
      }
    });

    if ('mediaSession' in navigator) {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: 'Dobrei a Esquina',
        artist: 'D. Marques',
        album: 'Dobrei a Esquina',
        artwork: [
          { src: 'Dobrei a Esquina Capa.png', sizes: '512x512', type: 'image/png' }
        ]
      });

      navigator.mediaSession.setActionHandler('play', playAudio);
      navigator.mediaSession.setActionHandler('pause', () => audio.pause());
      navigator.mediaSession.setActionHandler('seekto', details => {
        if (details.seekTime !== undefined) audio.currentTime = details.seekTime;
      });
    }

    window.addEventListener('load', () => {
      setActiveLine(0);
    });
  </script>
</body>
</html>
